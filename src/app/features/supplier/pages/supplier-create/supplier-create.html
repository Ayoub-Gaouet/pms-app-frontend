<div class="container">
  <div>
    <h2>Ajouter un Fournisseur :</h2>
  </div>
  <form>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Nom Fournisseur</label>
      <input type="text" [(ngModel)]="newSupplier.name"
             name="name" class="form-control">
    </div>

    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Matricule Fiscal</label>
      <input type="text" [(ngModel)]="newSupplier.tax_number"
             name="taxNumber"
             class="form-control">
    </div>
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Numéro de téléphone</label>
      <input type="text" [(ngModel)]="newSupplier.telephone_number"
             name="telephoneNumber"
             class="form-control">
    </div>
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Adresse</label>
      <input type="text" [(ngModel)]="newSupplier.address"
             name="adresse" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Categorie</label>

      <select class="form-control form-control-lg" id="idCat" name="idCat" [(ngModel)]="newIdCat">
        @for (cat of categories(); track cat.id) {
          <option [ngValue]="cat.id"> {{ cat.name }}
          </option>
        }
      </select>
    </div>


    <div class="mt-2">
      <button type="submit" (click)="createSupplier()" class="btn btn-success">Ajouter</button>
    </div>

    <div class="mt-2">
      <h3>{{ message }}</h3>
    </div>
  </form>
</div>
