<div class="container">
  <div>
    <h2>Modifier un Fournisseur :</h2>
  </div>
  <form>
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>ID Fournisseur</label>
      <input readonly type="text" [(ngModel)]="currentSupplier.id"
             name="id" class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Nom Fournisseur</label>
      <input type="text" [(ngModel)]="currentSupplier.name"
             name="name" class="form-control">
    </div>

    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Matricule Fiscal</label>
      <input type="text" [(ngModel)]="currentSupplier.tax_number"
             name="taxNumber" class="form-control">
    </div>

    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Numéro de téléphone</label>
      <input type="text" [(ngModel)]="currentSupplier.telephone_number"
             name="telephoneNumber" class="form-control">
    </div>

    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Adresse</label>
      <input type="text" [(ngModel)]="currentSupplier.address"
             name="address" class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Catégorie</label>
      <select class="form-control form-control-lg" id="idCat" name="idCat" [(ngModel)]="updatedCatId">
        @for(cat of categories(); track cat.id) {
          <option [ngValue]="cat.id"> {{ cat.name }} </option>
        }
      </select>
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Date création</label>
      <input type="date" [ngModel]="currentSupplier.created_at | date: 'yyyy-MM-dd'"
             (ngModelChange)="currentSupplier.created_at = $event" name="dateCreation"
             class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Date modification</label>
      <input type="date" [ngModel]="currentSupplier.updated_at | date: 'yyyy-MM-dd'"
             (ngModelChange)="currentSupplier.updated_at = $event" name="dateModification"
             class="form-control">
    </div>

    <div class="mt-2">
      <button type="submit" (click)="updateSupplier()" class="btn btn-success">Modifier</button>
    </div>
  </form>
</div>
