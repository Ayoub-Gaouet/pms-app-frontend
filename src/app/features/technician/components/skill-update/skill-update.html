<div class="card shadow-sm">
  <div class="card-header bg-primary text-white fw-bold">
    <i class="bi bi-tools me-2"></i>{{ isAdd ? 'Ajouter une compétence' : 'Modifier une compétence' }}
  </div>
  <div class="card-body">
    <form>
      <div [hidden]="isAdd" class="mb-3">
        <label class="form-label fw-semibold">ID Compétence</label>
        <input type="text" [(ngModel)]="skill.id" name="skillId" class="form-control w-25" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nom Compétence</label>
        <input
          type="text"
          [(ngModel)]="skill.name"
          name="skillName"
          class="form-control"
          placeholder="Entrez un nom de compétence...">
      </div>
      <div class="mt-2">
        <button
          type="submit"
          [disabled]="!skill.name"
          class="btn btn-success"
          (click)="saveSkill()">
          <i class="bi {{ isAdd ? 'bi-plus-circle' : 'bi-pencil' }} me-1"></i>
          {{ isAdd ? 'Ajouter' : 'Modifier' }}
        </button>
      </div>
    </form>
  </div>
</div>
