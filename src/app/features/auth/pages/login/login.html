<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">

    <!-- Logo / Header -->
    <div class="text-center mb-4">
      <div class="rounded-circle bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center p-3 mb-3">
        <i class="bi bi-person-lock text-primary" style="font-size: 2rem;"></i>
      </div>
      <h2 class="fw-bold text-dark mb-1">Connexion</h2>
      <p class="text-muted mb-0">Accédez à votre espace de gestion</p>
    </div>

    <!-- Card -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form>

          <!-- Alerte erreur -->
          @if (error == 1) {
            <div class="alert alert-danger d-flex align-items-center mb-3" role="alert">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <strong>Login ou mot de passe erronés.</strong>
            </div>
          }

          <!-- Nom Utilisateur -->
          <div class="mb-3">
            <label class="form-label fw-semibold text-dark">
              <i class="bi bi-person me-1 text-primary"></i>Nom Utilisateur
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input
                type="text"
                name="username"
                class="form-control border-start-0 ps-0"
                placeholder="Entrez votre nom d'utilisateur"
                [(ngModel)]="user.username"
              />
            </div>
          </div>

          <!-- Mot de passe -->
          <div class="mb-4">
            <label class="form-label fw-semibold text-dark">
              <i class="bi bi-lock me-1 text-primary"></i>Mot de passe
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input
                type="password"
                name="password"
                class="form-control border-start-0 ps-0"
                placeholder="Entrez votre mot de passe"
                [(ngModel)]="user.password"
              />
            </div>
          </div>

          <!-- Bouton Connexion -->
          <div class="d-grid">
            <button
              type="button"
              class="btn btn-primary d-flex align-items-center justify-content-center gap-2 py-2 shadow-sm"
              (click)="onLoggedin()"
            >
              <i class="bi bi-box-arrow-in-right"></i>
              Se connecter
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-muted small mt-3">
      <i class="bi bi-shield-lock me-1"></i>Production Management System
    </p>

  </div>
</div>
