<div class="container">
  <div>
    <h2>Ajouter un Produit :</h2>
  </div>
  <form >

    <div class="col-sm-4 col-md-4 col-lg-4" >
      <label >Nom Produit</label>
      <input  type="text"[(ngModel)]= "newProduct.name"
              name="name" class="form-control">
    </div>

    <div class="col-sm-2 col-md-2 col-lg-2">
      <label >Stock Produit</label>
      <input type="number"   [(ngModel)]= "newProduct.stock"
             name="stock" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Categorie</label>

      <select class="form-control form-control-lg" id="idCat" name="idCat" [(ngModel)]="newIdCat">
        @for(cat of categories(); track cat.id){
          <option [ngValue]="cat.id">  {{cat.nom}}
          </option>
        }
      </select>
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Fournisseur</label>

      <select class="form-control form-control-lg" id="idSupplier" name="idSupplier" [(ngModel)]="newIdSupplier">
        @for(supplier of suppliers(); track supplier.id){
          <option [ngValue]="supplier.id">  {{supplier.name}}
          </option>
        }
      </select>
    </div>


    <div class="mt-2">
      <button type="submit" (click)="createProduct()" class="btn btn-success">Ajouter</button>
    </div>

    <div class="mt-2">
      <h3>{{message}}</h3>
    </div>
  </form>
</div>
