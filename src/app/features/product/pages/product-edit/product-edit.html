<div class="container">
  <div>
    <h2>Modifier un Produit :</h2>
  </div>
  <form >
    <div  class="col-sm-2 col-md-2 col-lg-2">
      <label >ID  Produit</label>
      <input  readonly  type="text"  [(ngModel)]="currentProduct.id"
              name="id" class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4" >
      <label >Nom Produit</label>
      <input  type="text"[(ngModel)]= "currentProduct.name"
              name="name" class="form-control">
    </div>

    <div class="col-sm-2 col-md-2 col-lg-2">
      <label >Stock</label>
      <input type="number"   [(ngModel)]= "currentProduct.stock"
             name="stock" class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Categorie</label>
      <select class="form-control form-control-lg" id="idCat" name="idCat" [(ngModel)]="updatedCatId">
        @for(cat of categories(); track cat.id)
        {
          <option [ngValue]="cat.id">  {{cat.nom}} </option>
        }
      </select>
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Fournisseur</label>
      <select class="form-control form-control-lg" id="idSupplier" name="idSupplier" [(ngModel)]="updatedSupplierId">
        @for(supplier of suppliers(); track supplier.id)
        {
          <option [ngValue]="supplier.id">  {{supplier.name}} </option>
        }
      </select>
    </div>
    <div class="mt-2">
      <button type="submit" (click)="updateProduct()" class="btn btn-success">Modifier</button>
    </div>
  </form>
</div>
