<div class="card shadow-sm">
  <div class="card-header bg-primary text-white fw-bold">
    <i class="bi bi-tag me-2"></i>{{ isAdd ? 'Ajouter une catégorie' : 'Modifier une catégorie' }}
  </div>
  <div class="card-body">
    <form>
      <div [hidden]="isAdd" class="mb-3">
        <label class="form-label fw-semibold">ID Catégorie</label>
        <input type="text" [(ngModel)]="category.id" name="categoryId" class="form-control w-25" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nom Catégorie</label>
        <input
          type="text"
          [(ngModel)]="category.nom"
          name="categoryNom"
          class="form-control"
          placeholder="Entrez un nom de catégorie...">
      </div>
      <div class="mt-2">
        <button
          type="submit"
          [disabled]="!category.nom"
          class="btn btn-success"
          (click)="saveCategory()">
          <i class="bi {{ isAdd ? 'bi-plus-circle' : 'bi-pencil' }} me-1"></i>
          {{ isAdd ? 'Ajouter' : 'Modifier' }}
        </button>
      </div>
    </form>
  </div>
</div>
