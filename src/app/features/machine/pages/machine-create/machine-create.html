<div class="container">
    <div>
        <h2>Ajouter une Machine :</h2>
    </div>
    <form (ngSubmit)="createMachine()" #form="ngForm">

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Nom de la machine</label>
            <input type="text" [(ngModel)]="newMachine.nom" name="nom" class="form-control" required />
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <label>État initial</label>
            <select class="form-control form-control-lg" name="etat" [(ngModel)]="newMachine.etat" required>
                @for(etat of etats; track etat) {
                <option [ngValue]="etat">{{ etat }}</option>
                }
            </select>
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <label>Prochaine maintenance</label>
            <input type="date" [(ngModel)]="newMachine.maintenanceProchaine" name="maintenanceProchaine"
                class="form-control" />
        </div>

        <div class="mt-2">
            <button type="submit" [disabled]="!form.form.valid" class="btn btn-success">Ajouter</button>
        </div>

        <div class="mt-2" *ngIf="message">
            <h3>{{ message }}</h3>
        </div>
    </form>
</div>
